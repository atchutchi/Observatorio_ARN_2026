services:
  - type: web
    name: observatorio-arn-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: observatorio-arn-db
          property: connectionString
      - key: DJANGO_ALLOWED_HOSTS
        value: .onrender.com
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: REPORTS_GENERATE_SYNC
        value: "true"
      - key: DATA_UPLOAD_PROCESS_SYNC
        value: "true"
      - key: RUN_SEED_ON_STARTUP
        value: "false"
      - key: RUN_KPI_IMPORT_ON_STARTUP
        value: "false"
      - key: KPI_IMPORT_YEARS
        value: "2024 2021 2020 2019 2018"
      - key: USE_S3_STORAGE
        value: "false"
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: observatorio-arn-db
    databaseName: observatorio_arn
    user: observatorio_arn
    plan: free
    postgresMajorVersion: "16"
